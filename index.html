// === 渲染 ===
function getPriceTag(price) {
  if(price==='free') return 'tag-free';
  if(price==='paid') return 'tag-paid';
  return 'tag-freemium';
}

function getPriceLabel(price) {
  if(price==='free') return '免费';
  if(price==='paid') return '付费';
  return '免费+付费';
}

function renderTools(cat) {
  const container = document.getElementById('toolContainer');
  const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();

  let filtered = toolsData;
  if(cat && cat !== 'all') filtered = filtered.filter(t => t.cat === cat);
  if(searchVal) filtered = filtered.filter(t => 
    t.name.toLowerCase().includes(searchVal) || 
    t.desc.toLowerCase().includes(searchVal) ||
    t.tags.some(tag => tag.toLowerCase().includes(searchVal))
  );

  // 按分类分组
  const catOrder = ['chat','image','video','audio','code','write','design','productivity','other'];
  const catNames = {chat:'💬 对话AI',image:'🎨 图像生成',video:'🎬 视频生成',audio:'🎵 音频/音乐',code:'💻 编程助手',write:'✍️ 写作/文案',design:'🎯 设计/创意',productivity:'⚡ 效率工具',other:'🔧 其他'};

  const grouped = {};
  filtered.forEach(t => {
    if(!grouped[t.cat]) grouped[t.cat] = [];
    grouped[t.cat].push(t);
  });

  if(Object.keys(grouped).length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>没有找到匹配的工具</p><p style="margin-top:8px;font-size:13px;color:#6b7280">换个关键词试试</p></div>`;
    return;
  }

  let html = '';
  for(const c of catOrder) {
    if(!grouped[c]) continue;
    const tools = grouped[c];
    const adInserted = html.includes('ad-slot');
    html += `
      <div class="category" data-cat="${c}">
        <div class="category-header">
          <span class="category-icon">${catNames[c].split(' ')[0]}</span>
          <span class="category-title">${catNames[c].split(' ').slice(1).join(' ')}</span>
          <span class="category-count">${tools.length} 个工具</span>
        </div>
        <div class="tool-grid">
          ${tools.map(t => `
            <div class="tool-card" onclick="window.open('${t.url}','_blank')">
              <div class="tool-card-top">
                <div class="tool-icon">${t.icon}</div>
                <div class="tool-info">
                  <div class="tool-name">${t.name}</div>
                  <div class="tool-desc">${t.desc}</div>
                </div>
              </div>
              <div class="tool-tags">
                ${t.tags.map(tag => `<span class="tool-tag">${tag}</span>`).join('')}
                <span class="tool-tag ${getPriceTag(t.price)}">${getPriceLabel(t.price)}</span>
              </div>
              <span class="tool-link">访问官网</span>
            </div>
          `).join('')}
        </div>
      </div>
      ${!adInserted && c === catOrder[Math.floor(catOrder.indexOf(c)/1.5)] ? `<div class="ad-slot"><span>📢 中间广告位 — 替换为 AdSense 代码</span></div>` : ''}
    `;
  }

  container.innerHTML = html;
}

// === 分类切换 ===
function switchCategory(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTools(cat);
}

// === 搜索 ===
function filterTools() {
  const activeTab = document.querySelector('.cat-tab.active');
  const cat = activeTab ? activeTab.dataset.cat : 'all';
  renderTools(cat);
}

// === 回到顶部 ===
window.addEventListener('scroll', () => {
  document.getElementById('backTop').style.display = window.scrollY > 300 ? 'flex' : 'none';
});

// === 初始化 ===
renderTools('all');
</script>

</body>
</html>
